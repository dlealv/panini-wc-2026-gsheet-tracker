<style>
  /* src/html/MobileWebAppStyles.html
   * Mobile-first styles for the standalone Panini Tracker mobile web app.
   * Designed as a full-page layout (not a dialog) with large touch targets
   * and readable font sizes optimized for phone screens.
   */
  :root {
    --border: #c6cacc;
    --text: #202124;
    --muted: #5f6368;
    --bg-soft: #f8f9fa;
    --primary: #1a73e8;
    --primary-hover: #1765cc;
    --success: #137333;
    --error: #c5221f;
    --warning: #b06000;
    --text-xs: 20px;
    --text-sm: 26px;
    --text-md: 28px;
    --text-lg: 30px;
    --text-xl: 32px;
    --text-2xl: 36px;
  }

  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  body {
    font-family:
      -apple-system,
      BlinkMacSystemFont,
      "Segoe UI",
      Roboto,
      Helvetica,
      Arial,
      sans-serif;
    font-size: var(--text-md);
    color: var(--text);
    background: #f0f4f8;

    margin: 0;
    padding: 0;
  }

  .mobile-page {
    width: 100%;
    padding-bottom: 24px;
  }

  /* ── Header ─────────────────────────────────────────────────────────── */
  .header {
    background: var(--primary);
    color: #fff;
    padding: 16px;
  }

  .header-title {
    font-size: var(--text-2xl);
    font-weight: 700;
    padding-left: 46px;
    line-height: 1.2;
  }

  .header-sub {
    font-size: var(--text-sm);
    opacity: .85;
    padding-left: 46px;
    margin-top: 2px;
  }

  /* ── Menu content ────────────────────────────────────────────────────── */
  .view {
    width: 100%;
  }

  /* ── Main content ────────────────────────────────────────────────────── */
  main {
    padding: 12px;
    padding-bottom: 80px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .card {
    background: #fff;
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .section-title {
    font-size: var(--text-xl);
    font-weight: 700;
    margin-bottom: 8px;
  }

  .field {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  label {
    font-size: var(--text-md);
    font-weight: 600;
  }

  textarea,
  select {
    font-size: var(--text-lg);
    padding: 14px;
    border: 1px solid var(--border);
    border-radius: 8px;
    width: 100%;
    background: #fff;
  }

  textarea {
    font-size: var(--text-lg);
    resize: vertical;
    min-height: 45vh;
  }

  /* ── Buttons ─────────────────────────────────────────────────────────── */
  .actions {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .btn {
    display: block;
    width: 100%;
    padding: 16px;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: #fff;
    color: var(--text);
    font-size: var(--text-lg);
    min-height: 60px;
    border-radius: 12px;
    font-weight: 600;
    cursor: pointer;
    text-align: center;
    -webkit-tap-highlight-color: transparent;
  }

  .btn:active {
    opacity: 0.75;
  }

  .btn:disabled {
    opacity: 0.45;
    cursor: not-allowed;
  }

  .btn-primary {
    background: var(--primary);
    border-color: var(--primary);
    color: #fff;
  }

  .btn-primary:active {
    background: var(--primary-hover);
  }

  /* row for secondary actions */
  .btn-row {
    display: flex;
    gap: 10px;
  }

  /* equal width buttons inside row */
  .btn-row .btn {
    flex: 1;
  }

  /* optional secondary style */
  .btn-secondary {
    background: #fff;
    border: 1px solid var(--border);
    color: var(--muted);
  }

  .drawer {
    position: fixed;
    top: 0;
    left: 0;
    width: 200px;
    max-width: 75vw;
    height: 100%;
    background: white;
    border-right: 1px solid #ddd;
    padding: 16px;
    z-index: 1000;
    box-shadow: 3px 0 12px rgba(0, 0, 0, .25);
  }

  .drawer-item {
    font-size: var(--text-lg);
    padding: 18px;
    cursor: pointer;
  }

  .drawer-item:hover {
    background: #f5f5f5;
  }

  .menu-btn {
    position: absolute;
    left: 12px;
    top: 10px;
    width: 44px;
    height: 44px;
    min-width: 48px;
    min-height: 48px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: transparent;
    border: none;
    color: white;
    font-size: 42px;
    line-height: 1;
    padding: 4px 8px;
    cursor: pointer;
    appearance: none;
    -webkit-appearance: none;
  }

  .overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.35);
    z-index: 999;
  }

  /* ── Status / Feedback ───────────────────────────────────────────────── */
  .message {
    padding: 12px;
    border-radius: 8px;
    font-size: var(--text-sm);
    min-height: 44px;
    display: flex;
    align-items: center;
  }

  .message:empty {
    display: none;
  }

  .message.success {
    background: #e6f4ea;
    color: var(--success);
  }

  .message.error {
    background: #fce8e6;
    color: var(--error);
  }

  .message.info {
    background: var(--bg-soft);
    color: var(--muted);
  }

  .message.warning {
    background: #fff8e1;
    color: var(--warning);
  }

  .warnings {
    background: #fff8e1;
    border: 1px solid #ffe082;
    border-radius: 8px;
    padding: 10px 12px;
    font-size: var(--text-sm);
    color: var(--warning);
  }

  .warnings p {
    margin: 3px 0;
  }

  .preview {
    background: var(--bg-soft);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px;
    font-size: var(--text-sm);
    font-family: Consolas, 'Courier New', monospace;
    white-space: pre-wrap;
    overflow-x: auto;
  }

  .hidden {
    display: none !important;
  }

  /* ── Format hint table ───────────────────────────────────────────────── */
  .format-hint {
    font-size: 14px;
    color: var(--muted);
    line-height: 1.6;
  }

  .ic {
    font-family: Consolas, 'Courier New', monospace;
    background: var(--bg-soft);
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 0 3px;
  }

  @supports (-webkit-touch-callout: none) {
    body {
      min-height: -webkit-fill-available;
    }
  }
</style>
