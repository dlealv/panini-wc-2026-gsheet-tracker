<style>
  /* src/html/MobileWebAppStyles.html
   * Mobile-first styles for the standalone Panini Tracker mobile web app.
   * Designed as a full-page layout (not a dialog) with large touch targets
   * and readable font sizes optimised for phone screens.
   */
  :root {
    --border: #c6cacc;
    --text: #202124;
    --muted: #5f6368;
    --bg-soft: #f8f9fa;
    --primary: #1a73e8;
    --primary-hover: #1765cc;
    --success: #137333;
    --error: #c5221f;
    --warning: #b06000;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: Arial, sans-serif;
    font-size: 16px;
    color: var(--text);
    background: #f0f4f8;
  }

  .mobile-page {
    max-width: 600px;
    margin: 0 auto;
    padding-bottom: 32px;
  }

  /* ── Header ─────────────────────────────────────────────────────────── */
  .header {
    background: var(--primary);
    color: #fff;
    padding: 16px;
  }

  .header-title {
    font-size: 20px;
    font-weight: 700;
  }

  .header-sub {
    font-size: 13px;
    opacity: 0.85;
    margin-top: 4px;
  }

  /* ── Main content ────────────────────────────────────────────────────── */
  main {
    padding: 12px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .card {
    background: #fff;
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .section-title {
    font-size: 16px;
    font-weight: 700;
    color: var(--text);
  }

  .field {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  label {
    font-size: 14px;
    font-weight: 600;
  }

  textarea,
  select {
    font: inherit;
    font-size: 15px;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px;
    width: 100%;
    background: #fff;
  }

  textarea {
    resize: vertical;
    min-height: 130px;
  }

  /* ── Buttons ─────────────────────────────────────────────────────────── */
  .actions {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .btn {
    display: block;
    width: 100%;
    padding: 14px;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: #fff;
    color: var(--text);
    font: inherit;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    text-align: center;
    -webkit-tap-highlight-color: transparent;
  }

  .btn:active { opacity: 0.75; }

  .btn:disabled {
    opacity: 0.45;
    cursor: not-allowed;
  }

  .btn-primary {
    background: var(--primary);
    border-color: var(--primary);
    color: #fff;
  }

  .btn-primary:active { background: var(--primary-hover); }

  /* ── Status / Feedback ───────────────────────────────────────────────── */
  .message {
    padding: 12px;
    border-radius: 8px;
    font-size: 14px;
    min-height: 44px;
    display: flex;
    align-items: center;
  }

  .message:empty { display: none; }

  .message.success { background: #e6f4ea; color: var(--success); }
  .message.error   { background: #fce8e6; color: var(--error); }
  .message.info    { background: var(--bg-soft); color: var(--muted); }
  .message.warning { background: #fff8e1; color: var(--warning); }

  .warnings {
    background: #fff8e1;
    border: 1px solid #ffe082;
    border-radius: 8px;
    padding: 10px 12px;
    font-size: 13px;
    color: var(--warning);
  }

  .warnings p { margin: 3px 0; }

  .preview {
    background: var(--bg-soft);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px;
    font-size: 13px;
    font-family: Consolas, 'Courier New', monospace;
    white-space: pre-wrap;
    overflow-x: auto;
  }

  .hidden { display: none !important; }

  /* ── Format hint table ───────────────────────────────────────────────── */
  .format-hint {
    font-size: 12px;
    color: var(--muted);
    line-height: 1.6;
  }

  .ic {
    font-family: Consolas, 'Courier New', monospace;
    background: var(--bg-soft);
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 0 3px;
  }
</style>
