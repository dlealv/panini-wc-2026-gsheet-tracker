<!DOCTYPE html>
<!--
  src/html/ExportDialog.html

  Provides the dialog used to export sticker data from the tracker.

  This HTML file is a thin adapter over ExportService.
  Export generation and formatting live in the backend.
  The UI is responsible only for collecting export options,
  invoking GAS functions, and rendering results.

  Supported export modes:
  1. export_all    — exports all owned stickers
  2. export_shared — exports repeated and missing stickers

  Template variables injected from Code.gs:
  - dialogMode: controls the export mode
    ('export_all' | 'export_shared')

  Helpers are loaded via include.
-->
<html>

<head>
  <base target="_top">
  <meta charset="utf-8">
  <?!= include('CommonDialogStyles') ?>
  <?!= include('ImportExportDialogStyles') ?>
</head>

<body>
  <div class="container">

    <div>
      <h2>Export result</h2>
      <div class="hint">
        <? if (dialogMode === 'export_all') { ?>
        Export all sticker (<span class="inline-code">count&gt;0</span>) from the
        <span class="inline-code">COUNTRIES</span> and
        <span class="inline-code">COUNTS</span> named ranges.
        <? } else if (dialogMode === 'export_shared') { ?>
        Export repeated (<span class="inline-code">count&gt;1</span>) and missing
        (<span class="inline-code">count=0</span>) stickers from the
        <span class="inline-code">COUNTRIES</span> and
        <span class="inline-code">COUNTS</span> named ranges.
        <? } ?>
      </div>
    </div>

    <script>
      window.EXPORT_MODE = '<?= dialogMode ?>'
    </script>

    <?!= include('ExportView') ?>

  </div><!-- /container -->

  <?!= include('ExportDialogHelpers') ?>

  <script>
    window.addEventListener('load', () => {
      initializeExportView('<?= dialogMode ?>')
    })
  </script>

</body>

</html>
