<!DOCTYPE html>
<!--
  src/html/QuickEntryDialog.html

  Provides the Quick Sticker Entry dialog UI.
  It renders country cards, supports incremental filtering, and queues sticker updates
  before applying them back to the spreadsheet.

  Via include command helper functions (*Helpers.html) are loaded.
  Functions remaining in this file are specific GAS calls and DOM manipulation and not covered by automated tests yet, 
  but they have been designed to facilitate testing in the future.
-->
<html>

<head>
  <base target="_top">
  <meta charset="utf-8">
  <?!= include('CommonDialogStyles') ?>
  <?!= include('QuickEntryDialogStyles') ?>
</head>

<body>
  <div class="container">
    <div class="section">
      <div class="top-bar">
        <div class="top-actions">
          <button id="applyChangesButton" class="btn btn-primary" onclick="applyChanges()">Update</button>
        </div>

        <div class="filters">
          <input type="text" id="teamSearchInput" class="filter-input" placeholder="Search by team code or country name"
            oninput="handleFiltersChange()">
          <select id="groupFilterSelect" class="filter-select" onchange="handleFiltersChange()">
            <option value="all">All groups</option>
          </select>
          <button class="btn btn-filter" data-filter="all" onclick="setStatusFilter('all')">All</button>
          <button class="btn btn-filter" data-filter="missing" onclick="setStatusFilter('missing')">Missing</button>
          <button class="btn btn-filter" data-filter="repeated" onclick="setStatusFilter('repeated')">Repeated</button>
          <button class="btn btn-filter" data-filter="pending" onclick="setStatusFilter('pending')">Pending</button>
        </div>

        <div class="legend">
          <span class="legend-item">
            <span class="legend-swatch count-0"></span>
            <span>Missing</span>
          </span>
          <span class="legend-item">
            <span class="legend-swatch count-1"></span>
            <span>Owned x1</span>
          </span>
          <span class="legend-item">
            <span class="legend-swatch count-2"></span>
            <span>Repeated x2</span>
          </span>
          <span class="legend-item">
            <span class="legend-swatch count-3"></span>
            <span>Repeated x3</span>
          </span>
          <span class="legend-item">
            <span class="legend-swatch count-4"></span>
            <span>Repeated x4</span>
          </span>
          <span class="legend-item">
            <span class="legend-swatch count-5-plus"></span>
            <span>Repeated x5+</span>
          </span>
          <span class="legend-item">
            <span class="legend-swatch pending"></span>
            <span>Pending changes</span>
          </span>
          <span class="legend-item">
            <span class="legend-swatch completed"></span>
            <span>Complete team</span>
          </span>
        </div>
      </div>
    </div>

    <div id="message" class="message info"></div>

    <div class="section country-list-wrapper">
      <div id="countryList" class="country-list"></div>
    </div>
  </div>

  <?!= include('QuickEntryDialogHelpers.html') ?>
  <?!= include('QuickEntryDialogRender.html') ?>

  <script>
    const FILTERS = Object.freeze({ ALL: 'all', MISSING: 'missing', REPEATED: 'repeated', PENDING: 'pending' })
    const GROUP_FILTERS = Object.freeze({ ALL: 'all' })
    const state = {
      countries: [], groupCodes: [], selectedStatusFilter: FILTERS.ALL,
      selectedGroupFilter: GROUP_FILTERS.ALL, teamSearchText: '', pendingUpdates: {}, isBusy: false, isLoaded: false
    }

    const layout = { stickersPerRow: 8 }

    const teamSearchInput = document.getElementById('teamSearchInput')
    const groupFilterSelect = document.getElementById('groupFilterSelect')
    const messageEl = document.getElementById('message')
    const countryListEl = document.getElementById('countryList')
    const applyChangesButton = document.getElementById('applyChangesButton')

    /** Initializes the Quick Entry dialog and loads initial data. */
    function initialize() {
      showBusyState(true)
      showMessage('Loading countries...', 'info')

      //applyLayout(layout.stickersPerRow)
      if (typeof applyLayout === 'function') {
        applyLayout(layout.stickersPerRow)
      }
      google.script.run
        .withSuccessHandler(result => {
          try {
            state.countries = result.countries || []
            state.groupCodes = result.groupCodes || []
            state.selectedStatusFilter = result.selectedStatusFilter || FILTERS.ALL
            state.selectedGroupFilter = result.selectedGroupFilter || GROUP_FILTERS.ALL
            state.isLoaded = true
            showBusyState(false)
            renderAll()
            showMessage('Ready.', 'success')
          } catch (e) {
            showBusyState(false)
            showMessage('Render failed: ' + (e.message || e), 'error')
          }
        })
        .withFailureHandler(err => {
          showMessage(err && err.message ? err.message : 'Init failed', 'error')
        })
        .getQuickEntryInitialData()
    }

    /** Updates filters and refreshes the country list. */
    function handleFiltersChange() {
      state.teamSearchText = teamSearchInput.value.trim().toLowerCase()
      state.selectedGroupFilter = groupFilterSelect.value
      renderCountryList()
    }

    /** Updates the selected status filter. */
    function setStatusFilter(filterName) {
      state.selectedStatusFilter = filterName
      renderFilterButtons()
      renderCountryList()
    }

    /**Renders all UI sections (filters, buttons, list).*/
    function renderAll() {
      try {
        renderGroupFilterOptions()
        renderFilterButtons()
        renderApplyButton()
        renderCountryList()
      } catch (e) {
        //console.error('renderAll failed:', e)
        setMessage('Render error: ' + (e.message || e), 'error')
      }
    }

    /** Renders the group filter dropdown options. */
    function renderGroupFilterOptions() {
      const currentValue = state.selectedGroupFilter
      groupFilterSelect.innerHTML = ''

      const allOption = document.createElement('option')
      allOption.value = 'all'
      allOption.textContent = 'All groups'
      groupFilterSelect.appendChild(allOption)

      state.groupCodes.forEach(code => {
        const opt = document.createElement('option')
        opt.value = code
        opt.textContent = code
        groupFilterSelect.appendChild(opt)
      })

      groupFilterSelect.value = currentValue
    }

    /** Renders filter button states using helper logic. */
    function renderFilterButtons() {
      document.querySelectorAll('[data-filter]').forEach(button => {
        const filter = button.dataset.filter
        const isActive = (state.selectedStatusFilter === filter)
        button.classList.toggle('active', isActive)
        button.disabled = state.isBusy
      })
      teamSearchInput.disabled = state.isBusy
      groupFilterSelect.disabled = state.isBusy
    }

    /** Enables or disables the Update button. */
    function renderApplyButton() {
      applyChangesButton.disabled = state.isBusy || getPendingUpdates(state.pendingUpdates).length === 0
    }

    /** Renders the visible country cards. */
    function renderCountryList() {
      const visibleCountries = getVisibleCountries(state, layout)
      countryListEl.innerHTML = ''

      if (!visibleCountries.length) {
        countryListEl.appendChild(buildEmptyState(getEmptyStateMessage()))
        return
      }

      visibleCountries.forEach(country => {
        countryListEl.appendChild(buildCountrySection(country, state, layout, queueStickerChangeHandler))
      })
    }

    /** Returns the empty-state message text. */
    function getEmptyStateMessage() {
      if (!state.isLoaded) return 'Loading countries...'
      return 'No countries match the selected filters.'
    }

    /** Queues a sticker count change locally. */
    function queueStickerChangeHandler(countryCode, stickerNumber, nextCount) {
      const result = queueStickerChange(state, countryCode, stickerNumber, nextCount)
      state.pendingUpdates = result.pendingUpdates
      updatePendingChangesMessage(state, showMessage)
      renderAll()
    }

    /** Applies pending sticker updates to the backend in the front-end just the local state is updated immediately. */
    function applyChanges() {
      const pending = getPendingUpdates(state.pendingUpdates)
      if (!pending.length) {
        showMessage('There are no pending changes to update.', 'info')
        return
      }
      showBusyState(true)
      showMessage('Updating sticker data...', 'info')
      google.script.run
        .withSuccessHandler(result => {
          commitPendingUpdates(state, pending)
          state.pendingUpdates = {}
          showBusyState(false)
          renderAll()
          showMessage(result.message || 'Updated', 'success')
        })
        .withFailureHandler(handleFailure)
        .applyQuickEntryUpdates({ pendingUpdates: pending })
    }

    /** Displays a status message in the dialog. */
    function showMessage(text, type) {
      setMessage(messageEl, text, type)
    }

    /** Updates the busy state safely without helper dependencies. */
    function showBusyState(isBusy) {
      try {
        state.isBusy = Boolean(isBusy)
        applyChangesButton.disabled = state.isBusy || getPendingUpdates(state.pendingUpdates).length === 0
        teamSearchInput.disabled = state.isBusy
        groupFilterSelect.disabled = state.isBusy
      } catch (error) {
        console.error('showBusyState failed:', error)
      }
    }

    /** Handles backend request failures. */
    function handleFailure(error) {
      showBusyState(false)
      showMessage(error && error.message ? error.message : 'Unexpected error.', 'error')
    }

    initialize()
  </script>

</body>

</html>
