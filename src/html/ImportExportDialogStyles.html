<style>
  /* 
  src/html/ImportExportDialogStyles.html
  CSS variables for consistent theming and easy maintenance. Only the style for Import/Export Dialogs 
  */

  h2 {
    margin: 0 0 12px 0;
    font-size: 22px;
  }

  .section-title {
    margin: 0 0 10px 0;
    font-size: 14px;
    font-weight: 700;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  /* label row: label text on the left, inline action button on the right */
  .label-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 6px;
  }

  .label-row label {
    margin-bottom: 0;
  }

  input[type="file"],
  select,
  textarea {
    width: 100%;
    font: inherit;
  }

  input[type="file"],
  select {
    padding: 8px;
  }

  textarea {
    min-height: 220px;
    padding: 10px;
    resize: vertical;
    font-family: Consolas, "Courier New", monospace;
    font-size: 13px;
    border: 1px solid var(--border);
    border-radius: 6px;
    background: #fff;
    color: var(--text);
  }

  #exportText {
    min-height: 380px;
  }

  input[type="checkbox"] {
    margin-right: 6px;
  }

  textarea:disabled,
  select:disabled,
  input[type="file"]:disabled {
    background: #f1f3f4;
    color: #5f6368;
  }

  .hint {
    font-size: 12px;
    color: var(--muted);
    line-height: 1.5;
  }

  .actions-help {
    margin: 8px 0 0 18px;
    padding: 0;
  }

  .actions-help li {
    margin: 4px 0;
  }

  .checkbox-row {
    margin-top: 4px;
    /* was 10px */
  }

  .checkbox-row label {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 0;
    font-weight: 500;
  }

  /* tighten checkbox itself alignment */
  .checkbox-row input[type="checkbox"] {
    margin: 0;
  }

  .export-toolbar {
    display: flex;
    align-items: center;
    gap: 14px;
    flex-wrap: wrap;
    margin-bottom: 10px;
  }

  .toolbar-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    font-weight: 700;
    color: var(--muted);
  }

  .actions {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }

  /* small secondary button used inline next to a label */
  .btn-inline {
    padding: 3px 10px;
    font-size: 12px;
    font-weight: 600;
    border: 1px solid var(--border);
    background: #fff;
    color: var(--text);
    border-radius: 6px;
    cursor: pointer;
  }

  .btn-inline:hover:not(:disabled) {
    background: var(--bg-soft);
  }

  .warnings {
    display: none;
    font-size: 12px;
    color: var(--warning);
    white-space: pre-wrap;
    margin-top: 4px;
  }

  .preview {
    display: none;
    border: 1px solid var(--border);
    border-radius: 6px;
    background: var(--bg-soft);
    padding: 10px;
    max-height: 260px;
    overflow: auto;
    font-family: Consolas, "Courier New", monospace;
    font-size: 12px;
    white-space: pre-wrap;
    overflow-wrap: anywhere;
    word-break: break-word;
  }

  /* Info icon button — borderless, inline with section title */
  .help-btn {
    border: none;
    background: none;
    color: var(--primary);
    cursor: pointer;
    font-size: 15px;
    padding: 0 2px;
    font-weight: 700;
    line-height: 1;
  }

  .help-btn:hover {
    color: var(--primary-hover);
    background: none;
  }

  /* Format summary card — 3-row table, always visible */
  .format-card {
    width: 100%;
    border-collapse: collapse;
    font-size: 12px;
    margin-top: 4px;
  }

  .format-card th {
    text-align: left;
    color: var(--muted);
    font-weight: 600;
    padding: 3px 8px 3px 0;
    border-bottom: 1px solid var(--border);
  }

  .format-card td {
    padding: 4px 8px 4px 0;
    vertical-align: top;
  }

  /* tip row inside actions section */
  .tip-row {
    margin-top: 10px;
    font-size: 12px;
    color: var(--muted);
  }

  /* header row inside the help modal, with title and (+info) link */
  .help-header {
    display: flex;
    align-items: center;
    gap: 4px;
  }

  /* slightly smaller font size for the modal header to fit the (+info) link better */
  .help-header h3 {
    margin: 0;
    line-height: 1.1;
    font-size: 18px;
    /* optional slight reduction */
  }

  /* Help modal */
  dialog {
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 20px;
    max-width: 480px;
    width: 95%;
    font-family: Arial, sans-serif;
    font-size: 13px;
    color: var(--text);
    box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
  }

  dialog::backdrop {
    background: rgba(0, 0, 0, 0.35);
  }

  dialog h3 {
    margin: 0 0 12px 0;
    font-size: 16px;
  }

  /* general note shown above all format sections */
  dialog .modal-note {
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 12px;
    line-height: 1.6;
  }

  dialog details {
    margin-bottom: 10px;
  }

  dialog summary {
    font-weight: 700;
    cursor: pointer;
    padding: 4px 0;
    list-style: none;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  /* custom triangle for summary */
  dialog summary::before {
    content: '▶';
    font-size: 10px;
    color: var(--muted);
    transition: transform 0.15s;
  }

  dialog details[open] summary::before {
    transform: rotate(90deg);
  }

  dialog .modal-body {
    padding: 8px 0 4px 14px;
    line-height: 1.7;
    color: var(--muted);
  }

  dialog .modal-body .inline-code {
    font-family: Consolas, "Courier New", monospace;
    background: var(--bg-soft);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 1px 4px;
    color: var(--text);
  }

  dialog .modal-footer {
    margin-top: 14px;
    text-align: right;
  }
</style>
