<style>
  /* src/html/CommonDialogStyles.html
   * Shared styles used by all dialogs in the application.
   * Contains:
   * - Theme variables
   * - Typography
   * - Layout primitives
   * - Buttons
   * - Messages
   * - Form controls
   * - Utility classes
   * Dialog-specific styles belong in:
   * - ImportExportDialogStyles.html
   * - QuickEntryDialogStyles.html
 */
  :root {
    /*--border: #dadce0;*/
    --border: #c6cacc; /*darker border for better contrast*/
    --text: #202124;
    --muted: #5f6368;
    --bg-soft: #f8f9fa;
    --primary: #1a73e8;
    --primary-hover: #1765cc;
    --success: #137333;
    --error: #c5221f;
    --warning: #b06000;
  }

  * {
    box-sizing: border-box;
  }

  body {
    font-family: Arial, sans-serif;
    color: var(--text);
    background: #fff;
  }

  .container {
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .section {
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px;
    background: #fff;
  }

  .btn {
    border: 1px solid var(--border);
    background: #fff;
    color: var(--text);
    border-radius: 6px;
    padding: 9px 14px;
    cursor: pointer;
    font-weight: 600;
    white-space: nowrap;
  }

  .btn:hover:not(:disabled) {
    background: var(--bg-soft);
  }

  .btn:disabled {
    opacity: 0.7;
    cursor: not-allowed;
  }

  .btn-primary {
    background: var(--primary);
    border-color: var(--primary);
    color: #fff;
  }

  .btn-primary:hover:not(:disabled) {
    background: var(--primary-hover);
  }

  /* A button variant used for filter options, which can be toggled on/off. */
   .btn-filter {
    font-weight: 600;
  }

  /* Active state for filter buttons. */
  .btn-filter.active {
    border-color: var(--primary);
    color: var(--primary);
  }

  .message {
    min-height: 20px;
    font-size: 13px;
    white-space: pre-wrap;
  }

  .message.success {
    color: var(--success);
  }

  .message.error {
    color: var(--error);
  }

  .message.info {
    color: var(--muted);
  }

  .message.warning {
    color: var(--warning);
  }

  .hidden {
    display: none !important;
  }

  .inline-code {
    font-family: Consolas, "Courier New", monospace;
    background: var(--bg-soft);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 1px 4px;
  }

  label {
    display: inline-block;
    margin-bottom: 6px;
    font-weight: 600;
  }

  .hint {
    font-size: 12px;
    color: var(--muted);
    line-height: 1.5;
  }

  input,
  select,
  textarea,
  button {
    font: inherit;
  }

  select {
    width: 100%;
    padding: 8px;
  }

  .form-control {
    width: 100%;
    padding: 8px;
    border: 1px solid var(--border);
    border-radius: 6px;
  }
</style>
