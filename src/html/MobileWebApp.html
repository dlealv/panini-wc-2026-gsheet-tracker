<!DOCTYPE html>
<!--
  src/html/MobileWebApp.html

  Standalone mobile web page served by doGet() from the Apps Script project
  that is bound to each user's copy of the tracker spreadsheet.

  Purpose: provide mobile-browser access to the Import Sticker Counts service
  so collectors can update their collection while away from a desktop.

  Spike verification points:
    Spike 1 — The header displays the spreadsheet title injected via
               template.spreadsheetTitle, proving the web app context can
               resolve the bound spreadsheet through script properties.
    Spike 2 — Preview and Import buttons call previewStickerDataMobile() and
               importStickerDataMobile() via google.script.run, confirming
               the Import backend works correctly from the web app context.

  Template variables injected from Code.gs doGet():
    spreadsheetTitle {string} — name of the user's spreadsheet copy.

  This file is a Layer 1 dialog equivalent: it handles events and backend
  calls. Pure logic helpers should be extracted to MobileWebAppHelpers.html
  (Layer 2) if unit testing becomes necessary in future phases.
-->
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <base target="_top">
  <?!= include('MobileWebAppStyles') ?>
</head>

<body>
  <div class="mobile-page">

    <!-- ── Header: Spike 1 verification ─────────────────────────────────── -->
    <header class="header">
      <div class="header-title">🎴 Panini WC 2026</div>
      <!-- spreadsheetTitle injected by doGet() — confirms auth and sheet access -->
      <div class="header-sub"><?= spreadsheetTitle ?></div>
    </header>

    <main>

      <!-- ── Input card ──────────────────────────────────────────────────── -->
      <section class="card">
        <div class="section-title">Import Sticker Counts</div>

        <div class="field">
          <label for="textInput">Sticker data</label>
          <textarea id="textInput"
            placeholder="MEX,1,3-7,10&#10;MEX-1,MEX-5(2),MEX3&#10;&lt;&gt;FWC,1-10,12-19"></textarea>
        </div>

        <div class="field">
          <label for="mode">Import mode</label>
          <select id="mode">
            <option value="update">Update counts</option>
            <option value="replace_countries">Update counts clearing country counts</option>
            <option value="clean_all">Import data (clears all counts first)</option>
          </select>
        </div>

        <!-- Compact format hint inline to avoid needing a separate modal on mobile -->
        <div class="format-hint">
          <strong>Format examples:</strong><br>
          <span class="ic">MEX,1,3-7,10(2)</span> &mdash; country once, comma-separated stickers<br>
          <span class="ic">MEX-1,MEX-5(2)</span> &mdash; country prefix per sticker<br>
          <span class="ic">&lt;&gt;FWC,1-10</span> &mdash; exclusion: imports all stickers <em>except</em> those listed
        </div>
      </section>

      <!-- ── Action buttons ──────────────────────────────────────────────── -->
      <div class="actions">
        <button class="btn btn-primary" id="btnImport" onclick="importData()">Import</button>
        <button class="btn" id="btnPreview" onclick="previewData()">Validate / Preview</button>
        <button class="btn" id="btnClear" onclick="clearForm()">Clear</button>
      </div>

      <!-- ── Feedback areas ──────────────────────────────────────────────── -->
      <div id="message" class="message info"></div>
      <div id="warnings" class="warnings hidden"></div>
      <pre id="preview" class="preview hidden"></pre>

    </main>
  </div><!-- /.mobile-page -->

  <script>
    /* ── Element references ──────────────────────────────────────────────── */
    const textInput = document.getElementById('textInput')
    const modeInput = document.getElementById('mode')
    const messageEl = document.getElementById('message')
    const warningsEl = document.getElementById('warnings')
    const previewEl = document.getElementById('preview')

    /* ── UI helpers ──────────────────────────────────────────────────────── */

    /** Builds the backend payload from the current form state. */
    function getPayload() {
      return {
        text: textInput ? textInput.value : '',
        mode: modeInput ? modeInput.value : 'update'
      }
    }

    /** Updates the status message banner. */
    function setMessage(text, type) {
      if (!messageEl) { return }
      messageEl.className = 'message ' + (type || 'info')
      messageEl.textContent = text || ''
    }

    /** Enables or disables all interactive controls. */
    function setBusy(isBusy) {
      document.querySelectorAll('button').forEach(btn => { btn.disabled = isBusy })
      if (textInput) { textInput.disabled = isBusy }
      if (modeInput) { modeInput.disabled = isBusy }
    }

    /** Renders the warnings list returned by the backend. */
    function showWarnings(warnings) {
      warningsEl.textContent = ''
      if (!warnings || !warnings.length) {
        warningsEl.classList.add('hidden')
        return
      }
      warningsEl.classList.remove('hidden')
      warnings.forEach(w => {
        const p = document.createElement('p')
        p.textContent = '⚠ ' + w
        warningsEl.appendChild(p)
      })
    }

    /** Renders the import preview returned by the backend. */
    function showPreview(result) {
      if (!result || !result.countries || !result.countries.length) {
        previewEl.classList.add('hidden')
        return
      }
      const text = result.countries.map(c => {
        const stickers = (c.stickers || []).map(s => s.number + ':' + s.count).join(', ')
        return c.code + ' -> ' + stickers
      }).join('\n')
      previewEl.textContent = text
      previewEl.classList.remove('hidden')
    }

    /** Clears the preview panel. */
    function clearPreview() {
      previewEl.textContent = ''
      previewEl.classList.add('hidden')
    }

    /* ── Button handlers ─────────────────────────────────────────────────── */

    /**
     * Spike 2 verification: calls previewStickerDataMobile() via google.script.run,
     * confirming that the Import backend is reachable from the web app context.
     */
    function previewData() {
      clearPreview()
      showWarnings([])
      setBusy(true)
      setMessage('Validating...', 'info')
      google.script.run
        .withSuccessHandler(result => {
          setBusy(false)
          setMessage('Validation successful.', 'success')
          showWarnings(result.warnings)
          showPreview(result)
        })
        .withFailureHandler(err => {
          setBusy(false)
          clearPreview()
          setMessage(err && err.message ? err.message : String(err), 'error')
        })
        .previewStickerDataMobile(getPayload())
    }

    /** Imports the current sticker data into the spreadsheet. */
    function importData() {
      clearPreview()
      showWarnings([])
      setBusy(true)
      setMessage('Importing...', 'info')
      google.script.run
        .withSuccessHandler(result => {
          setBusy(false)
          setMessage(result && result.message ? result.message : 'Import completed.', 'success')
          showWarnings(result.warnings)
        })
        .withFailureHandler(err => {
          setBusy(false)
          setMessage(err && err.message ? err.message : String(err), 'error')
        })
        .importStickerDataMobile(getPayload())
    }

    /** Resets the form to its initial state. */
    function clearForm() {
      setBusy(false)
      if (textInput) { textInput.value = ''; textInput.focus() }
      if (modeInput) { modeInput.value = 'update' }
      clearPreview()
      showWarnings([])
      setMessage('Cleared.', 'info')
    }
  </script>
</body>

</html>
