<!DOCTYPE html>
<!--
  src/html/MobileHome.html

  Mobile web application shell served by doGet() from the Apps Script project
  bound to each user's copy of the tracker spreadsheet.

  Purpose:
    Provides the common layout and navigation for the mobile web application.
    Individual service views (Import, Export, Quick Entry, etc.) are injected
    into the main content area using include() directives.

  Responsibilities:
    - Defines the common application layout.
    - Displays the navigation drawer.
    - Switches between service views.
    - Hosts shared styles and navigation logic.

  This file intentionally contains only the common application shell and
  navigation logic. Service-specific UI and behavior belong to the
  corresponding Mobile*View.html files.
-->

<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <base target="_top">
  <?!= include('MobileStyles') ?>
  <?!= include('MobileImportStyles') ?>
  <?!= include('MobileExportStyles') ?>
</head>

<body>
  <div class="mobile-page">
    <!-- Application header ─────────────────────────────────────────────── -->
    <header class="header">
      <div class="header-title">🎴 Panini WC 2026</div>
      <button class="menu-btn" onclick="toggleMenu()">&#9776;</button>
      <!-- Spreadsheet title injected by doGet(). -->
      <div class="header-sub">
        <?= spreadsheetTitle ?>
      </div>
    </header>

    <!-- Navigation drawer ─────────────────────────────────────────────── -->
    <div id="drawer" class="drawer hidden">
      <div class="drawer-item" onclick="showView('import')">
        Import
      </div>
      <div class="drawer-item" onclick="showExportView('export_all')">
        Export all
      </div>
      <div class="drawer-item" onclick="showExportView('export_shared')">
        Export shared
      </div>
    </div>

    <!-- Overlay shown while the navigation drawer is open. -->
    <div id="overlay" class="overlay hidden" onclick="toggleMenu()"></div>
    <!--
      Service views are injected at template-render time.
      Only one view is visible at a time.
    -->
    <main>
      <?!= include('MobileImportView') ?>
      <?!= include('MobileExportView') ?>

      <script>
        // Force initial state: only import visible on load
        window.addEventListener('load', () => {
          const views = document.querySelectorAll('.view')
          views.forEach(v => v.classList.add('hidden'))

          const importView = document.getElementById('view-import')
          if (importView) {
            importView.classList.remove('hidden')
          }
        })
      </script>
    </main>
  </div>

  <script>
    /* ── Navigation ───────────────────────────────────────────────────────── */

    /** Toggles the visibility of the navigation drawer and its overlay. */
    function toggleMenu() {
      const drawer = document.getElementById('drawer')
      const overlay = document.getElementById('overlay')
      drawer.classList.toggle('hidden')
      overlay.classList.toggle('hidden')
    }

    /**
     * Switches the visible service view in the main content area.
     * Hides all other service views.
     * @param {string} view Service identifier (for example, "import").
     */
    function showView(view) {
      const previousView = document.querySelector('.view:not(.hidden)')
      if (previousView && previousView.id === 'view-import') {
        clearImportViewState()
      }
      if (previousView && previousView.id === 'view-export') {
        clearExportViewState()
      }
      document.querySelectorAll('.view').forEach(v => {
        v.classList.add('hidden')
      })
      const selected = document.getElementById('view-' + view)
      if (selected) {
        selected.classList.remove('hidden')
      }
      toggleMenu()
    }

    /**
     * Displays the shared export view using the requested export mode.
     * @param {string} mode Either 'export_all' or 'export_shared'.
     */
    function showExportView(mode) {
      showView('export')
      setExportTitle(mode)
      setExportTopHint(mode)
      if (typeof initializeExportView === 'function') {
        initializeExportView(mode)
      }
    }

    /**
     * Sets the title of the mobile export view based on the selected mode.
     * @param {string} mode Either 'export_all' or 'export_shared'.
     */
    function setExportTitle(mode) {
      const titleEl = document.getElementById('exportTitle')
      if (!titleEl) {
        return
      }
      titleEl.textContent = mode === 'export_shared' ? 'Export Shared' : 'Export All'
    }

    /**Sets the mobile export top hint for the selected export mode.*/
    function setExportTopHint(mode) {
      const hintEl = document.getElementById('mobileExportTopHint')
      if (!hintEl) {
        return
      }
      if (mode === 'export_all') {
        hintEl.innerHTML =
          'Export all sticker (<span class="inline-code">count&gt;0</span>) from the <span class="inline-code">COUNTRIES</span> and <span class="inline-code">COUNTS</span> named ranges.'
        return
      }
      if (mode === 'export_shared') {
        hintEl.innerHTML =
          'Export repeated (<span class="inline-code">count&gt;1</span>) and missing (<span class="inline-code">count=0</span>) stickers from the <span class="inline-code">COUNTRIES</span> and <span class="inline-code">COUNTS</span> named ranges.'
        return
      }
      hintEl.innerHTML = ''
    }

    /**
     * Clears the state of the export view, including messages, warnings,
     * preview, and checkboxes.
     */
    function clearExportViewState() {
      const exportMessageEl = document.getElementById('message')
      const exportWarningsEl = document.getElementById('warnings')
      const exportPreviewEl = document.getElementById('preview')
      const exportHintEl = document.getElementById('mobileExportTopHint')
      const includeFlagsCheckboxEl = document.getElementById('includeFlagsCheckbox')
      const isCompactCheckboxEl = document.getElementById('isCompactCheckbox')

      if (exportMessageEl) {
        exportMessageEl.textContent = ''
        exportMessageEl.className = 'message info'
      }
      if (exportWarningsEl) {
        exportWarningsEl.textContent = ''
        exportWarningsEl.classList.add('hidden')
      }
      if (exportPreviewEl) {
        exportPreviewEl.textContent = ''
        exportPreviewEl.classList.add('hidden')
      }
      if (exportHintEl) {
        exportHintEl.innerHTML = ''
      }
      if (includeFlagsCheckboxEl) {
        includeFlagsCheckboxEl.checked = false
      }
      if (isCompactCheckboxEl) {
        isCompactCheckboxEl.checked = false
      }
    }

    /**
 * Clears the state of the import view, including messages, warnings,
 * and preview output.
 */
    function clearImportViewState() {
      const importMessageEl = document.getElementById('message')
      const importWarningsEl = document.getElementById('warnings')
      const importPreviewEl = document.getElementById('preview')

      if (importMessageEl) {
        importMessageEl.textContent = ''
        importMessageEl.className = 'message info'
      }
      if (importWarningsEl) {
        importWarningsEl.textContent = ''
        importWarningsEl.classList.add('hidden')
      }
      if (importPreviewEl) {
        importPreviewEl.textContent = ''
        importPreviewEl.classList.add('hidden')
      }
    }

  </script>
</body>

</html>
