name: Panini WC 2026 GSheet Tracker - Production Deployment Pipeline

permissions:
  contents: read

on:
  push:
    branches:
      - main  # Runs on merge or direct push to main

  pull_request:
    branches:
      - main  # Runs validation on PRs targeting main

jobs:
  validate-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout repo
      - name: Checkout Repository Code
        uses: actions/checkout@v4

      # 2. Setup Node.js
      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      # 3. Install dependencies
      - name: Install Project Dependencies
        run: npm ci

      # 4. Install clasp globally so clasp.zsh can execute "clasp"
      - name: Install clasp CLI
        run: npm install -g @google/clasp

      # 5. Run ESLint
      - name: Run ESLint Quality Check
        run: npm run lint

      # 6. Build + tests
      - name: Project build and Run Jest Testing Suites
        run: npm test

      # 7. Install zsh (required by deployment script)
      - name: Install zsh
        run: sudo apt-get update && sudo apt-get install -y zsh

      # 8. Inject Google clasp credentials
      - name: Inject Clasp Authentication Tokens
        run: |
          printf '%s' '${{ secrets.CLASPRC_JSON_SECRET }}' > ~/.clasprc.json
          chmod 600 ~/.clasprc.json

      # 9. Deploy to Google Apps Script production
      - name: Deploy Flat Code Artifacts to GAS Production Server
        run: zsh scripts/clasp.zsh push ${{ secrets.PRODUCTION_SCRIPT_ID }}